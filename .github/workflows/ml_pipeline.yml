name: ML Training Pipeline

on:
  workflow_dispatch:    # manual trigger (you click a button on GitHub)
  schedule:
    - cron: '0 2 * * *'  # runs every day at 2am

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python training_pipeline.py

      - name: Check if model was registered
        run: |
          python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          versions = client.get_latest_versions('sentiment-classifier')
          if versions:
              print(f'Model registered: version {versions[0].version}')
              print(f'Accuracy: {versions[0].tags.get(\"accuracy\", \"unknown\")}')
          else:
              print('No model registered — accuracy below threshold')
          "