version: "3.8"

services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  worker:
    build: .
    command: celery -A worker worker --loglevel=info --pool=solo
    depends_on:
      - redis