name: ML Training Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python training_pipeline.py

      - name: Check model registration
        run: |
          python -c "
          import mlflow
          mlflow.set_tracking_uri('sqlite:///mlflow.db')
          client = mlflow.tracking.MlflowClient()
          versions = client.get_latest_versions('sentiment-classifier')
          if versions:
              print(f'Model registered: version {versions[0].version}')
          else:
              print('No model registered — accuracy below threshold')
          "

      - name: Commit updated MLflow DB
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add mlflow.db
          git diff --staged --quiet || git commit -m "Update MLflow DB after training run"
          git push